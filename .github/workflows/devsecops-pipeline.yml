import json, os

blockers = []
warnings = []

# Gitleaks secrets
try:
    data = json.load(open("scan_results/gitleaks-results.json"))
    count = len(data) if isinstance(data, list) else 0
    if count:
        warnings.append(f"Gitleaks: {count} secrets/credentials detected in repository")
except: pass

# TruffleHog secrets
try:
    data = json.load(open("scan_results/trufflehog-results.json"))
    count = len(data) if isinstance(data, list) else 0
    if count:
        warnings.append(f"TruffleHog: {count} verified/unverified secrets detected")
except: pass

# Critical CVEs
try:
    data = json.load(open("scan_results/trivy-fs-results.json"))
    crits = sum(1 for r in data.get("Results",[]) for v in r.get("Vulnerabilities",[]) if v.get("Severity")=="CRITICAL")
    if crits > 0:
        warnings.append(f"Trivy: {crits} critical CVEs in dependencies")
except: pass

# BOLA finding
try:
    data = json.load(open("scan_results/owasp-api-results.json"))
    crits = sum(1 for f in data.get("findings",[]) if f.get("severity")=="CRITICAL")
    if crits > 0:
        warnings.append(f"OWASP API: {crits} critical API security issues")
except: pass

print("=" * 65)
print("SECURITY GATE RESULTS")
print("=" * 65)
print(f"Target: OWASP Juice Shop (intentionally vulnerable app)")
print()
if blockers:
    print("STATUS: RELEASE BLOCKED")
    for b in blockers:
        print(f"  [FAIL] {b}")
elif warnings:
    print("STATUS: WARNINGS DETECTED (not blocking — educational target)")
    for w in warnings:
        print(f"  [WARN] {w}")
else:
    print("STATUS: PASS — No gate violations")
print()
print("Full report: GitHub Artifacts → security-report-pdf")
print("=" * 65)
