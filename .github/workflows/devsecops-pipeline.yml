name: DevSecOps Master Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  security_scans:
    name: "Run Trivy, Semgrep, and ZAP"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PDF Generator Dependencies
        run: pip install fpdf2

      # --- 1. SCA & Container Scan (Trivy) ---
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './juice-shop'
          format: 'json'
          output: 'trivy-results.json'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # --- 2. SAST Scan (Semgrep) ---
      - name: Run Semgrep SAST
        run: |
          pip install semgrep
          semgrep scan --config auto --json --output semgrep-results.json ./juice-shop
        continue-on-error: true

      # --- 3. DAST Scan (OWASP ZAP) ---
      - name: Build and Start OWASP Juice Shop
        run: |
          docker pull bkimminich/juice-shop
          docker run -d -p 3000:3000 bkimminich/juice-shop
          echo "Waiting for Juice Shop to boot..."
          sleep 15
          curl -s http://localhost:3000 > /dev/null || sleep 15

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          format: 'json'
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: Save ZAP Results
        run: |
          # ZAP action saves report_json.json in workspace if generated
          if [ -f report_json.json ]; then
            cp report_json.json zap-results.json
          else
            echo '{"site": []}' > zap-results.json
          fi
        continue-on-error: true

      # --- 4. Master Report Generation ---
      - name: Generate Master Audit Report (PDF)
        run: python scripts/generate_security_report.py

      - name: Upload Master Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: SOC2-DevSecOps-Master-Report
          path: SOC2_DevSecOps_Master_Report.pdf
