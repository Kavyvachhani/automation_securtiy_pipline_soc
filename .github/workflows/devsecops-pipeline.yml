# ─────────────────────────────────────────────────────────────
# STAGE 8 · AGGREGATE, REPORT & GATE
# ─────────────────────────────────────────────────────────────
  generate-report:
    name: "Stage 8 · Generate Enterprise Report"
    runs-on: ubuntu-latest
    needs: [secret-scanning, sast, sca, iac-security, sbom, container-security, dast]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download All Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Merge All Results into scan_results/
        run: |
          mkdir -p scan_results
          # Copy without overwriting — first artifact for a filename wins
          find all-artifacts/ -name "*.json" | while read f; do
            basename=$(basename "$f")
            if [ ! -f "scan_results/$basename" ]; then
              cp "$f" "scan_results/$basename"
            fi
          done
          echo "=== Merged scan files ==="
          ls -la scan_results/ | grep -v '^total' | awk '{print $NF, $5}'

      - name: Build Scan Manifest (SOC2 Evidence)
        run: |
          python3 - << 'PYEOF'
import json, os, datetime, hashlib

files = []
for fname in sorted(os.listdir("scan_results")):
    if not fname.endswith(".json"):
        continue
    fpath = f"scan_results/{fname}"
    size = os.path.getsize(fpath)
    with open(fpath, "rb") as f:
        sha256 = hashlib.sha256(f.read()).hexdigest()
    files.append({"file": fname, "size_bytes": size, "sha256": sha256})

manifest = {
    "schema_version": "2.0",
    "pipeline": "Enterprise DevSecOps Platform v2",
    "commit_sha": "${{ github.sha }}",
    "run_id": "${{ github.run_id }}",
    "run_number": "${{ github.run_number }}",
    "branch": "${{ github.ref_name }}",
    "actor": "${{ github.actor }}",
    "repository": "${{ github.repository }}",
    "timestamp_utc": datetime.datetime.utcnow().isoformat() + "Z",
    "scan_file_count": len(files),
    "scan_files": files
}
with open("scan_results/manifest.json", "w") as f:
    json.dump(manifest, f, indent=2)
print(f"Manifest: {len(files)} scan files with SHA256 checksums")
PYEOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        continue-on-error: true

      - name: Upload All Results to S3
        run: |
          BUCKET="${{ secrets.S3_VAULT_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "S3_VAULT_BUCKET not set — skipping S3 upload"
            exit 0
          fi
          PREFIX="scans/${{ github.sha }}"
          echo "Uploading to s3://$BUCKET/$PREFIX/"
          SUCCESS=0; FAIL=0
          for f in scan_results/*.json; do
            basename=$(basename "$f")
            if aws s3 cp "$f" "s3://$BUCKET/$PREFIX/$basename" \
              --metadata "commit=${{ github.sha }},run=${{ github.run_id }},branch=${{ github.ref_name }}" \
              --quiet 2>&1; then
              SUCCESS=$((SUCCESS+1))
            else
              FAIL=$((FAIL+1))
              echo "WARN: Failed to upload $basename"
            fi
          done
          echo "Upload complete: $SUCCESS succeeded, $FAIL failed"
        continue-on-error: true

      - name: Invoke Lambda Report Generator
        run: |
          LAMBDA="${{ secrets.LAMBDA_FUNCTION_NAME }}"
          BUCKET="${{ secrets.S3_VAULT_BUCKET }}"
          if [ -z "$LAMBDA" ] || [ -z "$BUCKET" ]; then
            echo "Lambda or S3 bucket not configured — skipping"
            exit 0
          fi
          PAYLOAD=$(python3 -c "import json; print(json.dumps({
            'commit_sha':  '${{ github.sha }}',
            'run_id':      '${{ github.run_id }}',
            'run_number':  '${{ github.run_number }}',
            'branch':      '${{ github.ref_name }}',
            'actor':       '${{ github.actor }}',
            'repository':  '${{ github.repository }}'
          }))")
          echo "Invoking Lambda: $LAMBDA"
          aws lambda invoke \
            --function-name "$LAMBDA" \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            lambda_response.json > lambda_meta.json 2>&1
          echo "=== Lambda Response Body ==="
          cat lambda_response.json
          echo ""
          python3 - << 'PYEOF'
import base64, json
with open("lambda_meta.json") as f:
    meta = json.load(f)
if "LogResult" in meta:
    logs = base64.b64decode(meta["LogResult"]).decode("utf-8", errors="replace")
    print("=== Lambda Execution Logs ===")
    print(logs)
if "FunctionError" in meta:
    print(f"Lambda FunctionError: {meta['FunctionError']}")
    import sys; sys.exit(1)
PYEOF
