name: Enterprise DevSecOps Platform v2

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
# STAGE 1 - SECRET SCANNING  (Gitleaks + TruffleHog)
# ─────────────────────────────────────────────────────────────
jobs:
  secret-scanning:
    name: "Stage 1 - Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Binary with JSON Output
        run: |
          mkdir -p scan_results
          GITLEAKS_VERSION="8.18.4"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          chmod +x gitleaks
          ./gitleaks detect \
            --source . \
            --report-format json \
            --report-path scan_results/gitleaks-results.json \
            --exit-code 0 \
            --log-level warn 2>&1 || true
          python3 -c "import json; d=json.load(open('scan_results/gitleaks-results.json')); print('Gitleaks: ' + str(len(d) if isinstance(d,list) else 0) + ' secrets detected')" 2>/dev/null || echo "Gitleaks output check skipped"
        continue-on-error: true

      - name: Gitleaks - Ensure Valid Output
        run: |
          python3 -c "import json; json.load(open('scan_results/gitleaks-results.json'))" 2>/dev/null || echo '[]' > scan_results/gitleaks-results.json

      - name: TruffleHog - Install and Scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | \
            sh -s -- -b /tmp/trufflehog-bin 2>/dev/null || true
          if [ -f /tmp/trufflehog-bin/trufflehog ]; then
            /tmp/trufflehog-bin/trufflehog git file://. --json --no-update 2>/dev/null | \
              python3 .github/scripts/parse_trufflehog.py || echo "[]" > scan_results/trufflehog-results.json
          else
            echo "TruffleHog install failed - writing empty result"
            echo "[]" > scan_results/trufflehog-results.json
          fi
        continue-on-error: true

      - name: TruffleHog - Ensure Valid Output
        run: |
          [ -s scan_results/trufflehog-results.json ] || echo "[]" > scan_results/trufflehog-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: scan-secrets
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 2 - SAST  (Semgrep + SonarQube)
# ─────────────────────────────────────────────────────────────
  sast:
    name: "Stage 2 - SAST"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Semgrep - SAST Scan
        run: |
          pip install semgrep -q
          mkdir -p scan_results
          semgrep scan \
            --config auto \
            --json \
            --output scan_results/semgrep-results.json \
            ./juice-shop 2>&1 | tail -5 || true
          python3 -c "import json; d=json.load(open('scan_results/semgrep-results.json')); r=d.get('results',[]); print('Semgrep: ' + str(len(r)) + ' findings')" 2>/dev/null || true
        continue-on-error: true

      - name: Semgrep - Ensure Valid Output
        run: |
          python3 -c "import json; json.load(open('scan_results/semgrep-results.json'))" 2>/dev/null || echo '{"results":[],"errors":[]}' > scan_results/semgrep-results.json

      - name: SonarQube Analysis (Requires SONAR_TOKEN secret)
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          SONAR_SCANNER_VERSION="6.1.0.4477"
          wget -q "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip"
          unzip -q "sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip"
          export PATH="$PATH:$PWD/sonar-scanner-${SONAR_SCANNER_VERSION}-linux/bin"
          cd juice-shop
          sonar-scanner \
            -Dsonar.projectKey="${{ secrets.SONAR_PROJECT_KEY }}" \
            -Dsonar.organization="${{ secrets.SONAR_ORGANIZATION }}" \
            -Dsonar.host.url="${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}" \
            -Dsonar.login="$SONAR_TOKEN" \
            -Dsonar.sources=. \
            -Dsonar.scm.provider=git 2>&1 | tail -20 || true
          HOST="${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}"
          KEY="${{ secrets.SONAR_PROJECT_KEY }}"
          curl -sf -u "$SONAR_TOKEN:" \
            "${HOST}/api/issues/search?componentKeys=${KEY}&pageSize=500&severities=BLOCKER,CRITICAL,MAJOR,MINOR" \
            -o "../scan_results/sonarqube-results.json" || \
            echo '{"issues":[],"paging":{"total":0}}' > "../scan_results/sonarqube-results.json"
          python3 -c "import json; d=json.load(open('../scan_results/sonarqube-results.json')); print('SonarQube: ' + str(d.get('paging',{}).get('total',0)) + ' issues')" 2>/dev/null || true
        continue-on-error: true

      - name: SonarQube - Ensure Output Exists
        run: |
          if [ ! -s scan_results/sonarqube-results.json ]; then
            echo '{"issues":[],"paging":{"total":0},"_skipped":true}' > scan_results/sonarqube-results.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: scan-sast
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 3 - SCA & DEPENDENCIES  (Trivy + Grype + npm audit)
# ─────────────────────────────────────────────────────────────
  sca:
    name: "Stage 3 - SCA & Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./juice-shop"
          format: "json"
          output: "scan_results/trivy-fs-results.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
        continue-on-error: true

      - name: npm Audit - Full JSON Report
        run: |
          mkdir -p scan_results
          cd juice-shop
          npm install --ignore-scripts --prefer-offline --legacy-peer-deps 2>/dev/null | tail -3 || true
          npm audit --json > ../scan_results/npm-audit-results.json 2>&1 || true
          python3 -c "import json; m=json.load(open('../scan_results/npm-audit-results.json')).get('metadata',{}).get('vulnerabilities',{}); print('npm audit: critical=' + str(m.get('critical',0)) + ' high=' + str(m.get('high',0)))" 2>/dev/null || true
        continue-on-error: true

      - name: Grype Vulnerability Scan
        uses: anchore/scan-action@v3
        id: grype_scan
        with:
          path: ./juice-shop
          output-format: json
          fail-build: false
          severity-cutoff: low
        continue-on-error: true

      - name: Grype - Save Results
        run: |
          mkdir -p scan_results
          if [ -f results.json ]; then
            cp results.json scan_results/grype-results.json
            python3 -c "import json; d=json.load(open('scan_results/grype-results.json')); print('Grype: ' + str(len(d.get('matches',[]))) + ' matches')" 2>/dev/null || true
          else
            echo '{"matches":[]}' > scan_results/grype-results.json
          fi
        continue-on-error: true

      - name: SCA - Ensure All Outputs Exist
        run: |
          mkdir -p scan_results
          [ -s scan_results/trivy-fs-results.json ]  || echo '{"Results":[]}' > scan_results/trivy-fs-results.json
          [ -s scan_results/npm-audit-results.json ] || echo '{"vulnerabilities":{},"metadata":{"vulnerabilities":{"info":0,"low":0,"moderate":0,"high":0,"critical":0,"total":0}}}' > scan_results/npm-audit-results.json
          [ -s scan_results/grype-results.json ]     || echo '{"matches":[]}' > scan_results/grype-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: scan-sca
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 4 - IaC SECURITY  (Checkov + tfsec)
# ─────────────────────────────────────────────────────────────
  iac-security:
    name: "Stage 4 - IaC Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkov - pip install for reliable JSON output
        run: |
          pip install checkov -q
          mkdir -p scan_results
          checkov \
            --directory . \
            --framework terraform \
            --output json \
            --soft-fail 2>/dev/null > scan_results/checkov-results.json || true
          python3 -c "import json; d=json.load(open('scan_results/checkov-results.json')); d2=d[0] if isinstance(d,list) and d else d; f=len(d2.get('results',{}).get('failed_checks',[])); print('Checkov: ' + str(f) + ' failed checks')" 2>/dev/null || true
        continue-on-error: true

      - name: Checkov - Normalize Array to Object
        run: python3 .github/scripts/normalize_checkov.py

      - name: tfsec - IaC Security Scan
        run: |
          curl -sL "https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64" \
            -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec || true
          mkdir -p scan_results
          /usr/local/bin/tfsec ./terraform --format json 2>/dev/null > scan_results/tfsec-results.json || true
          python3 -c "import json; d=json.load(open('scan_results/tfsec-results.json')); print('tfsec: ' + str(len(d.get('results',[]))) + ' findings')" 2>/dev/null || true
        continue-on-error: true

      - name: IaC - Ensure All Outputs Exist
        run: |
          [ -s scan_results/checkov-results.json ] || echo '{"results":{"failed_checks":[],"passed_checks":[]},"summary":{"failed":0,"passed":0}}' > scan_results/checkov-results.json
          [ -s scan_results/tfsec-results.json ]   || echo '{"results":[]}' > scan_results/tfsec-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: scan-iac
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 5 - SBOM  (Syft CycloneDX + SPDX)
# ─────────────────────────────────────────────────────────────
  sbom:
    name: "Stage 5 - SBOM Generation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./juice-shop
          format: cyclonedx-json
          output-file: scan_results/sbom-cyclonedx.json
        continue-on-error: true

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./juice-shop
          format: spdx-json
          output-file: scan_results/sbom-spdx.json
        continue-on-error: true

      - name: SBOM - Ensure Outputs Exist
        run: |
          mkdir -p scan_results
          [ -s scan_results/sbom-cyclonedx.json ] || echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' > scan_results/sbom-cyclonedx.json
          [ -s scan_results/sbom-spdx.json ]      || echo '{"spdxVersion":"SPDX-2.3","packages":[]}' > scan_results/sbom-spdx.json
          python3 -c "import json; d=json.load(open('scan_results/sbom-cyclonedx.json')); print('SBOM CycloneDX: ' + str(len(d.get('components',[]))) + ' components')" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: scan-sbom
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 6 - CONTAINER SECURITY  (Trivy Image + Docker Bench)
# ─────────────────────────────────────────────────────────────
  container-security:
    name: "Stage 6 - Container Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull Juice Shop Image
        run: docker pull bkimminich/juice-shop:latest
        continue-on-error: true

      - name: Trivy Container Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "bkimminich/juice-shop:latest"
          format: "json"
          output: "scan_results/trivy-image-results.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
        continue-on-error: true

      - name: Docker Bench Security
        run: |
          mkdir -p scan_results
          docker run --rm --net host --pid host \
            --cap-add audit_control \
            -v /etc:/etc:ro \
            -v /var/lib:/var/lib:ro \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            --label docker_bench_security \
            docker/docker-bench-security 2>&1 | python3 .github/scripts/parse_docker_bench.py || \
            echo '{"tool":"docker-bench-security","summary":{},"findings":[]}' > scan_results/docker-bench-results.json
        continue-on-error: true

      - name: Container - Ensure All Outputs Exist
        run: |
          mkdir -p scan_results
          [ -s scan_results/trivy-image-results.json ]  || echo '{"Results":[]}' > scan_results/trivy-image-results.json
          [ -s scan_results/docker-bench-results.json ] || echo '{"tool":"docker-bench-security","summary":{},"findings":[]}' > scan_results/docker-bench-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: scan-container
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 7 - DAST & API SECURITY  (ZAP + Nuclei + Shannon + OWASP API)
# ─────────────────────────────────────────────────────────────
  dast:
    name: "Stage 7 - DAST & API Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Boot OWASP Juice Shop - Wait for Health
        run: |
          docker pull bkimminich/juice-shop:latest
          docker run -d -p 3000:3000 --name juice-shop bkimminich/juice-shop:latest
          echo "Waiting for Juice Shop to be ready..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:3000/rest/admin/application-version > /dev/null 2>&1; then
              echo "Juice Shop ready after ${i} attempts"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:3000 > /dev/null || echo "WARNING: Juice Shop may not be fully ready"

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: ZAP - Capture JSON Report from Workspace
        run: |
          mkdir -p scan_results
          echo "Files in workspace root after ZAP:"
          ls -la *.json 2>/dev/null || echo "(no json files)"
          for candidate in "report_json.json" "/github/workspace/report_json.json" "zap-baseline-report.json" "/github/home/zap-baseline-report.json"; do
            if [ -f "$candidate" ]; then
              cp "$candidate" scan_results/zap-results.json
              echo "ZAP report found at: $candidate"
              break
            fi
          done
          python3 -c "import json; d=json.load(open('scan_results/zap-results.json')); a=sum(len(s.get('alerts',[]))for s in d.get('site',[])); print('ZAP: '+str(a)+' alerts')" 2>/dev/null || echo '{"site":[]}' > scan_results/zap-results.json
        continue-on-error: true

      - name: Nuclei DAST Scan (v3)
        uses: projectdiscovery/nuclei-action@v3
        with:
          target: http://localhost:3000
          flags: "-severity critical,high,medium,low -no-color -jsonl"
          output: scan_results/nuclei-raw.jsonl
        continue-on-error: true

      - name: Nuclei - Normalize JSONL to JSON Array
        run: |
          mkdir -p scan_results
          python3 .github/scripts/normalize_nuclei.py
        continue-on-error: true

      - name: Shannon AI Endpoint Pentester
        run: |
          python scripts/shannon_ai_pentester.py \
            --target http://localhost:3000 \
            --output scan_results/shannon-results.json
        continue-on-error: true

      - name: OWASP API Security Top 10 Check
        run: |
          pip install requests -q
          python3 .github/scripts/owasp_api_check.py
        continue-on-error: true

      - name: DAST - Ensure All Outputs Exist
        run: |
          mkdir -p scan_results
          [ -s scan_results/zap-results.json ]       || echo '{"site":[]}' > scan_results/zap-results.json
          [ -s scan_results/nuclei-results.json ]    || echo '[]' > scan_results/nuclei-results.json
          [ -s scan_results/shannon-results.json ]   || echo '{"findings":[]}' > scan_results/shannon-results.json
          [ -s scan_results/owasp-api-results.json ] || echo '{"findings":[]}' > scan_results/owasp-api-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: scan-dast
          path: scan_results/
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# STAGE 8 - AGGREGATE, REPORT & GATE
# ─────────────────────────────────────────────────────────────
  generate-report:
    name: "Stage 8 - Generate Enterprise Report"
    runs-on: ubuntu-latest
    needs: [secret-scanning, sast, sca, iac-security, sbom, container-security, dast]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download All Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Merge All Results into scan_results/
        run: |
          mkdir -p scan_results
          find all-artifacts/ -name "*.json" | while read f; do
            base=$(basename "$f")
            if [ ! -f "scan_results/$base" ]; then
              cp "$f" "scan_results/$base"
            fi
          done
          echo "=== Merged scan files ==="
          ls -la scan_results/ | grep -v '^total' | awk '{print $NF, $5}'

      - name: Build Scan Manifest (SOC2 Evidence)
        run: python3 .github/scripts/build_manifest.py

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        continue-on-error: true

      - name: Upload All Results to S3
        run: |
          BUCKET="${{ secrets.S3_VAULT_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "S3_VAULT_BUCKET not set - skipping S3 upload"
            exit 0
          fi
          PREFIX="scans/${{ github.sha }}"
          echo "Uploading to s3://$BUCKET/$PREFIX/"
          SUCCESS=0; FAIL=0
          for f in scan_results/*.json; do
            base=$(basename "$f")
            if aws s3 cp "$f" "s3://$BUCKET/$PREFIX/$base" \
              --metadata "commit=${{ github.sha }},run=${{ github.run_id }},branch=${{ github.ref_name }}" \
              --quiet 2>&1; then
              SUCCESS=$((SUCCESS+1))
            else
              FAIL=$((FAIL+1))
              echo "WARN: Failed to upload $base"
            fi
          done
          echo "Upload complete: $SUCCESS succeeded, $FAIL failed"
        continue-on-error: true

      - name: Package and Deploy Lambda
        run: |
          LAMBDA="${{ secrets.LAMBDA_FUNCTION_NAME }}"
          if [ -z "$LAMBDA" ]; then
            echo "LAMBDA_FUNCTION_NAME not set - skipping"
            exit 0
          fi
          rm -rf lambda_package lambda_function.zip
          pip install fpdf2 -t lambda_package/ -q
          cp lambda/generate_report.py lambda_package/
          cd lambda_package && zip -r ../lambda_function.zip . -q && cd ..
          aws lambda update-function-code \
            --function-name "$LAMBDA" \
            --zip-file fileb://lambda_function.zip \
            --no-cli-pager 2>&1 | tail -5
          aws lambda wait function-updated --function-name "$LAMBDA" --no-cli-pager 2>&1 || true
          echo "Lambda deployed"
        continue-on-error: true

      - name: Invoke Lambda Report Generator
        run: |
          LAMBDA="${{ secrets.LAMBDA_FUNCTION_NAME }}"
          BUCKET="${{ secrets.S3_VAULT_BUCKET }}"
          if [ -z "$LAMBDA" ] || [ -z "$BUCKET" ]; then
            echo "Lambda or S3 bucket not configured - skipping"
            exit 0
          fi
          PAYLOAD=$(python3 -c "import json; print(json.dumps({'commit_sha':'${{ github.sha }}','run_id':'${{ github.run_id }}','run_number':'${{ github.run_number }}','branch':'${{ github.ref_name }}','actor':'${{ github.actor }}','repository':'${{ github.repository }}'}))")
          echo "Invoking Lambda: $LAMBDA"
          aws lambda invoke \
            --function-name "$LAMBDA" \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            lambda_response.json > lambda_meta.json 2>&1
          echo "=== Lambda Response ==="
          cat lambda_response.json
          echo ""
          python3 .github/scripts/parse_lambda_response.py
        continue-on-error: true

      - name: Download PDF from S3
        run: |
          BUCKET="${{ secrets.S3_VAULT_BUCKET }}"
          [ -z "$BUCKET" ] && exit 0
          sleep 8
          aws s3 cp "s3://$BUCKET/scans/${{ github.sha }}/SOC2_DevSecOps_Master_Report.pdf" \
            SOC2_DevSecOps_Master_Report.pdf 2>&1 && \
            echo "PDF downloaded: $(wc -c < SOC2_DevSecOps_Master_Report.pdf) bytes" || \
            echo "PDF not yet in S3"
        continue-on-error: true

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report-pdf
          path: SOC2_DevSecOps_Master_Report.pdf
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload Combined JSON Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-scan-results-json
          path: scan_results/
          retention-days: 90

      - name: Security Gate Check
        run: python3 .github/scripts/security_gate.py

      - name: Print Scan Summary Table
        if: always()
        run: python3 .github/scripts/print_summary.py
